<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>360 Depth Viewer (2.5D Parallax)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; font-family: 'Inter', 'Segoe UI', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(15, 15, 20, 0.85);
            backdrop-filter: blur(12px);
            padding: 24px;
            border-radius: 16px;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
            max-width: 320px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            z-index: 10;
        }
        h1 { margin: 0 0 5px 0; font-size: 1.3rem; font-weight: 700; background: linear-gradient(90deg, #00d2ff, #3a7bd5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p.subtitle { margin: 0 0 20px 0; font-size: 0.85rem; color: #aaa; }
        .control-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #ddd; font-weight: 500; }
        input[type="file"] { width: 100%; color: #fff; font-size: 0.8rem; background: rgba(0,0,0,0.3); padding: 8px; border-radius: 8px; border: 1px dashed rgba(255,255,255,0.2); }
        input[type="range"] { width: 100%; accent-color: #00d2ff; }
        .value-display { font-size: 0.85rem; color: #00d2ff; float: right; font-weight: bold; }
        .help-text { color: #888; font-size: 0.75rem; display: block; margin-top: 4px; line-height: 1.3;}
    </style>
</head>
<body>
    <div id="ui-panel">
        <h1>360 Depth Parallax</h1>
        <p class="subtitle">Efecto 2.5D con Mapas de Profundidad</p>
        
        <div class="control-group">
            <label>1. Imagen panorámica 360:</label>
            <input type="file" id="upload-color" accept="image/*">
            <span class="help-text">Equirectangular a color (jpg, png)</span>
        </div>

        <div class="control-group">
            <label>2. Mapa de Profundidad:</label>
            <input type="file" id="upload-depth" accept="image/*">
            <span class="help-text">Grayscale (blanco es más cerca, negro es más lejos)</span>
        </div>

        <div class="control-group">
            <label>Intensidad del Relieve <span id="scale-val" class="value-display">15.0</span></label>
            <input type="range" id="displacement-scale" min="0" max="50" step="0.5" value="15.0">
        </div>
        
        <div class="control-group">
            <label>Resolución Geométrica <span id="subdiv-val" class="value-display">256</span></label>
            <input type="range" id="subdivision-slider" min="64" max="1024" step="64" value="256">
            <span class="help-text">Mayor subdivisión = más detalle de relieve, pero consume más rendimiento.</span>
        </div>

        <button id="btn-fullscreen" style="background:linear-gradient(90deg, #00d2ff, #3a7bd5); color:#fff; border:none; padding:12px; width:100%; border-radius:8px; font-weight:600; cursor:pointer; margin-top:5px; transition: transform 0.2s;">🔍 Pantalla Completa</button>
        <button id="btn-hide-ui" style="background:rgba(255,255,255,0.1); color:#ccc; border:1px solid rgba(255,255,255,0.2); padding:10px; width:100%; border-radius:8px; font-weight:500; cursor:pointer; margin-top:10px;">👻 Ocultar Panel (Presiona ESC para volver)</button>
    </div>
    
    <div id="canvas-container"></div>

    <!-- Cargar Three.js localmente -->
    <script src="three.min.js"></script>
    <script src="OrbitControls.js"></script>

    <script>
        let scene, camera, renderer, controls, sphere, material;
        let colorTexture = null;
        let depthTexture = null;
        let subdivisions = 256;
        let particles, pointLight;
        
        // Variables para el paralaje automático con el mouse
        let mouseX = 0;
        let mouseY = 0;
        let targetX = 0;
        let targetY = 0;
        const windowHalfX = window.innerWidth / 2;
        const windowHalfY = window.innerHeight / 2;

        init();
        animate();

        function createProceduralTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 2048;
            canvas.height = 1024;
            const ctx = canvas.getContext('2d');
            
            for(let i=0; i<64; i++) {
                for(let j=0; j<32; j++) {
                    ctx.fillStyle = (i+j)%2 === 0 ? '#1a1a24' : '#2a2a35';
                    ctx.fillRect(i*32, j*32, 32, 32);
                }
            }
            
            ctx.fillStyle = '#00d2ff';
            ctx.font = 'bold 40px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText("CARGA UNA FOTO 360", 1024, 512);

            return new THREE.CanvasTexture(canvas);
        }

        function createProceduralDepth() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            
            for(let i=0; i<64; i++) {
                for(let j=0; j<32; j++) {
                    let distY = Math.abs(16 - j);
                    let v = 255 - (distY * 15);
                    v = Math.max(0, Math.min(255, v));
                    ctx.fillStyle = `rgb(${v},${v},${v})`;
                    ctx.fillRect(i*8, j*8, 8, 8);
                }
            }
            
            return new THREE.CanvasTexture(canvas);
        }

        function init() {
            const container = document.getElementById('canvas-container');

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 0.1); 

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            // Removido ToneMapping para no distorsionar colores de la foto
            container.appendChild(renderer.domElement);

            // Controles
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableZoom = true; // Habilitado para que puedas acercarte a la pared
            controls.enablePan = true;  // Habilitado para hacer traslación (Clic Derecho)
            // controls.rotateSpeed = -0.3; 

            // Iluminación
            // Luz ambiental fuerte y neutral (para mantener colores 100% fieles)
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.9);
            scene.add(ambientLight);

            // Luz puntual sutil y blanca (ya no azul) para dar pulso físico sin teñir la foto
            pointLight = new THREE.PointLight(0xffffff, 0.2, 120);
            pointLight.position.set(0, 0, 0); 
            scene.add(pointLight);

            buildSphere();
            createParticles();

            window.addEventListener('resize', onWindowResize, false);
            document.addEventListener('mousemove', onDocumentMouseMove, false);
            setupUI();
        }
        
        function onDocumentMouseMove(event) {
            // Normalizar el mouse en rango de -1 a 1
            mouseX = (event.clientX - windowHalfX) / windowHalfX;
            mouseY = (event.clientY - windowHalfY) / windowHalfY;
        }

        function createParticles() {
            const particleCount = 2000;
            const geometry = new THREE.BufferGeometry();
            const posArray = new Float32Array(particleCount * 3);

            for(let i=0; i < particleCount * 3; i+=3) {
                // Posicion random esférica (Radio 80)
                const r = 80 * Math.cbrt(Math.random());
                const theta = Math.random() * 2 * Math.PI;
                const phi = Math.acos(2 * Math.random() - 1);
                
                posArray[i] = r * Math.sin(phi) * Math.cos(theta); // x
                posArray[i+1] = r * Math.sin(phi) * Math.sin(theta); // y
                posArray[i+2] = r * Math.cos(phi); // z
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            
            const material = new THREE.PointsMaterial({
                size: 0.15,
                color: 0xffffff,
                transparent: true,
                opacity: 0.5,
                blending: THREE.AdditiveBlending
            });
            
            particles = new THREE.Points(geometry, material);
            scene.add(particles);
        }

        function buildSphere() {
            if(sphere) scene.remove(sphere);

            const geometry = new THREE.SphereGeometry(100, subdivisions, subdivisions);

            let dispScale = document.getElementById('displacement-scale').value;

            material = new THREE.MeshStandardMaterial({
                side: THREE.BackSide, 
                wireframe: false,
                // Empuja la pared hacia la cámara. Un mapa de profundidad usualmente 
                // blanco = cerca (desplazamiento negativo con backfaces), negro = lejos
                displacementScale: -parseFloat(dispScale),
            });

            if(colorTexture) material.map = colorTexture;
            else material.map = createProceduralTexture();

            if(depthTexture) material.displacementMap = depthTexture;
            else material.displacementMap = createProceduralDepth();

            sphere = new THREE.Mesh(geometry, material);
            scene.add(sphere);
        }

        function setupUI() {
            const uploadColor = document.getElementById('upload-color');
            const uploadDepth = document.getElementById('upload-depth');
            const dispScale = document.getElementById('displacement-scale');
            const subdivSlider = document.getElementById('subdivision-slider');
            
            uploadColor.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if(file) {
                    const reader = new FileReader();
                    reader.onload = (re) => {
                        const loader = new THREE.TextureLoader();
                        loader.load(re.target.result, (texture) => {
                            texture.wrapS = THREE.ClampToEdgeWrapping;
                            texture.wrapT = THREE.ClampToEdgeWrapping;
                            texture.minFilter = THREE.LinearFilter;
                            colorTexture = texture;
                            material.map = colorTexture;
                            material.needsUpdate = true;
                        });
                    };
                    reader.readAsDataURL(file);
                }
            });

            uploadDepth.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if(file) {
                    const reader = new FileReader();
                    reader.onload = (re) => {
                        const loader = new THREE.TextureLoader();
                        loader.load(re.target.result, (texture) => {
                            texture.wrapS = THREE.ClampToEdgeWrapping;
                            texture.wrapT = THREE.ClampToEdgeWrapping;
                            texture.minFilter = THREE.LinearFilter;
                            depthTexture = texture;
                            material.displacementMap = depthTexture;
                            material.needsUpdate = true;
                        });
                    };
                    reader.readAsDataURL(file);
                }
            });

            dispScale.addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                document.getElementById('scale-val').innerText = val.toFixed(1);
                if(material) {
                    material.displacementScale = -val;
                }
            });
            
            subdivSlider.addEventListener('change', (e) => {
                subdivisions = parseInt(e.target.value);
                document.getElementById('subdiv-val').innerText = subdivisions;
                buildSphere();
            });
            
            subdivSlider.addEventListener('input', (e) => {
                document.getElementById('subdiv-val').innerText = e.target.value;
            });

            // UI Toggles
            document.getElementById('btn-hide-ui').addEventListener('click', () => {
                document.getElementById('ui-panel').style.display = 'none';
            });

            window.addEventListener('keydown', (e) => {
                if(e.key === 'Escape') {
                    document.getElementById('ui-panel').style.display = 'block';
                }
            });

            document.getElementById('btn-fullscreen').addEventListener('click', () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(err => {
                        console.log("Error intentando fullscreen: ", err);
                    });
                } else {
                    if (document.exitFullscreen) {
                        document.exitFullscreen(); 
                    }
                }
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            const time = Date.now() * 0.001;

            // Parallax local continuo y Respiración
            // El mouse define el centro del movimiento, y le sumamos una onda senoidal (respiración)
            const breathX = Math.sin(time * 0.8) * 1.5;
            const breathY = Math.cos(time * 0.6) * 1.5;

            targetX = (mouseX * 8.0) + breathX; 
            targetY = (-mouseY * 8.0) + breathY;
            
            // Suavizamos el movimiento de la cámara/esfera
            const group = sphere; 
            if (group) {
                group.position.x += (targetX - group.position.x) * 0.05;
                group.position.y += (targetY - group.position.y) * 0.05;
            }

            // Animación del entorno
            if (particles) {
                // Rotación levitante del polvo
                particles.rotation.y = time * 0.05;
                particles.rotation.z = time * 0.02;
            }

            if (pointLight) {
                // Pulso muy tenue (0.1 a 0.3 de intensidad) que no arruina los colores originales
                pointLight.intensity = 0.2 + Math.sin(time * 2.0) * 0.1;
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
